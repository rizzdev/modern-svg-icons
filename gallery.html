<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EzToolz Icon Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0c0c0e;
  --surface:#16161a;
  --surface2:#1e1e24;
  --border:#2a2a32;
  --text:#e4e4e8;
  --text2:#8b8b96;
  --accent:#42A5F5;
  --accent2:#66BB6A;
  --accent3:#FFC107;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* Subtle grid bg */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px),
    linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
  z-index:0;
}

.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:40px 32px 80px}

/* Header */
.header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  margin-bottom:40px;
  flex-wrap:wrap;
  gap:16px;
}
.header h1{
  font-size:28px;
  font-weight:700;
  letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header .count{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--text2);
  background:var(--surface);
  padding:6px 14px;
  border-radius:20px;
  border:1px solid var(--border);
}

/* Search + filter bar */
.controls{
  display:flex;
  gap:12px;
  margin-bottom:32px;
  flex-wrap:wrap;
  align-items:center;
}
.search-wrap{
  position:relative;
  flex:1;
  min-width:240px;
}
.search-wrap svg{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  width:16px;height:16px;
  stroke:var(--text2);
  fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
}
.search-wrap input{
  width:100%;
  padding:12px 14px 12px 42px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-size:14px;
  outline:none;
  transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}

.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  padding:8px 16px;
  border-radius:20px;
  font-size:13px;
  font-weight:500;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text2);
  cursor:pointer;
  transition:all .2s;
  user-select:none;
}
.pill:hover{border-color:var(--text2)}
.pill.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:12px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px 8px 12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.card:hover{
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(66,165,245,.1);
}
.card:active{transform:translateY(0)}

.card .icon-wrap{
  width:56px;height:56px;
  display:flex;align-items:center;justify-content:center;
}
.card .icon-wrap img{
  width:48px;height:48px;
  object-fit:contain;
}

.card .name{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--text2);
  text-align:center;
  line-height:1.3;
  word-break:break-all;
}

/* Copied toast */
.card .toast{
  position:absolute;
  inset:0;
  background:rgba(66,187,106,.9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  color:#fff;
  border-radius:14px;
  opacity:0;
  pointer-events:none;
  transition:opacity .15s;
}
.card .toast.show{opacity:1}

/* Empty state */
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:80px 20px;
  color:var(--text2);
  font-size:15px;
}

/* Floating stats bar */
.stats-bar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--surface2);
  border:1px solid var(--border);
  padding:10px 24px;
  border-radius:24px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  color:var(--text2);
  backdrop-filter:blur(12px);
  z-index:10;
  display:flex;
  gap:20px;
}
.stats-bar span{color:var(--accent)}

@media(max-width:600px){
  .app{padding:20px 16px 80px}
  .header h1{font-size:22px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
  .card{padding:12px 6px 8px}
  .card .icon-wrap{width:44px;height:44px}
  .card .icon-wrap img{width:40px;height:40px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>EzToolz Icon Gallery</h1>
    <div class="count" id="countBadge">514 icons</div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search icons..." autocomplete="off">
    </div>
    <div class="filter-pills" id="filters"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="stats-bar">
  <div>showing <span id="visCount">140</span></div>
  <div>click to copy URL</div>
</div>

<script>
const BASE = 'icons';

// kebab-case → Display Name (e.g. "dev-tools" → "Dev Tools")
function formatCategory(slug) {
  return slug.replace(/(^|-)(\w)/g, (_, sep, c) => (sep ? ' ' : '') + c.toUpperCase())
    .replace('Ai Ml', 'AI & ML')
    .replace('Data Api', 'Data & API')
    .replace('Frontend Ui', 'Frontend & UI')
    .replace('Design Ux', 'Design & UX')
    .replace('Testing Qa', 'Testing & QA')
    .replace('Ci Cd', 'CI/CD')
    .replace('Cloud Devops', 'Cloud & DevOps')
    .replace('Database Storage', 'Database & Storage')
    .replace('Status Workflow', 'Status & Workflow')
    .replace('Files Media', 'Files & Media')
    .replace('Arrows Symbols', 'Arrows & Symbols')
    .replace('Math Crypto', 'Math & Crypto')
    .replace('Backend Languages', 'Backend & Languages')
    .replace('Http Codes', 'HTTP Codes');
}

(async () => {
  // Load categories from single source of truth
  const raw = await fetch('scripts/categories.json').then(r => r.json());

  // Invert: icon→category into category→icons
  const categories = {};
  const iconCat = {};
  for (const [name, entry] of Object.entries(raw)) {
    const display = formatCategory(entry.category);
    if (!categories[display]) categories[display] = [];
    categories[display].push(name);
    iconCat[name] = display;
  }
  const allIcons = Object.values(categories).flat();

  // Render filter pills
  const filtersEl = document.getElementById('filters');
  const cats = ['All', ...Object.keys(categories).sort()];
  let activeFilter = 'All';

  cats.forEach(cat => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (cat === 'All' ? ' active' : '');
    pill.textContent = cat;
    pill.onclick = () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeFilter = cat;
      render();
    };
    filtersEl.appendChild(pill);
  });

  const searchEl = document.getElementById('search');
  const gridEl = document.getElementById('grid');

  function render() {
    const q = searchEl.value.toLowerCase().trim();
    const filtered = allIcons.filter(name => {
      if (activeFilter !== 'All' && iconCat[name] !== activeFilter) return false;
      if (q && !name.includes(q)) return false;
      return true;
    });

    gridEl.innerHTML = '';
    if (filtered.length === 0) {
      gridEl.innerHTML = '<div class="empty">No icons match your search</div>';
    } else {
      filtered.forEach((name, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${i * 15}ms`;
        card.innerHTML = `
          <div class="icon-wrap"><img src="${BASE}/${name}.svg" alt="${name}" loading="lazy"></div>
          <div class="name">${name}</div>
          <div class="toast">Copied!</div>
        `;
        card.onclick = () => {
          const url = `${BASE}/${name}.svg`;
          navigator.clipboard.writeText(url).then(() => {
            const toast = card.querySelector('.toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 800);
          });
        };
        gridEl.appendChild(card);
      });
    }

    document.getElementById('visCount').textContent = filtered.length;
    document.getElementById('countBadge').textContent = `${allIcons.length} icons`;
  }

  searchEl.addEventListener('input', render);
  render();
})();
</script>
</body>
</html>

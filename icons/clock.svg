<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="256" height="256">
<style>
@keyframes tickSec{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes tickMin{0%{transform:rotate(0)}100%{transform:rotate(30deg)}}
.sec{animation:tickSec 4s linear infinite;transform-origin:22px 22px}
.min{animation:tickMin 4s linear infinite;transform-origin:22px 22px}
</style>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="256" height="256">
<style>
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.bx{animation:bob 2s ease-in-out infinite}
</style>

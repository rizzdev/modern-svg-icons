<rect x="5" y="8" width="34" height="30" rx="3" fill="#FFB74D"/>
<rect x="5" y="8" width="34" height="10" rx="3" fill="#FFA726"/>
<rect x="5" y="16" width="34" height="2" fill="#FFA726"/>
<rect x="18" y="8" width="8" height="30" fill="#EF6C00" opacity=".3"/>
<rect x="18" y="12" width="8" height="6" rx="1" fill="#EF6C00"/>
</g>
</svg>
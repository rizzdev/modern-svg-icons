<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="256" height="256">
<style>@keyframes tcpHandshake{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
.th{stroke-dasharray:5 5;animation:tcpHandshake 1.5s linear infinite}</style>
<rect x="4" y="10" width="12" height="24" rx="3" fill="#42A5F5"/>
<rect x="28" y="10" width="12" height="24" rx="3" fill="#66BB6A"/>
<text x="10" y="24" text-anchor="middle" font-family="monospace" font-size="4" fill="#FFF">SYN</text>
<text x="34" y="24" text-anchor="middle" font-family="monospace" font-size="4" fill="#FFF">ACK</text>
<line class="th" x1="16" y1="18" x2="28" y2="18" stroke="#FFC107" stroke-width="2"/>
<line class="th" x1="28" y1="22" x2="16" y2="22" stroke="#EF5350" stroke-width="2"/>
<line class="th" x1="16" y1="26" x2="28" y2="26" stroke="#AB47BC" stroke-width="2"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="256" height="256">
<style>
@keyframes wigL{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
@keyframes wigR{0%,100%{transform:rotate(0)}25%{transform:rotate(6deg)}75%{transform:rotate(-6deg)}}
@keyframes twitch{0%,100%{transform:rotate(0)}30%{transform:rotate(-8deg)}60%{transform:rotate(5deg)}}
.bl{animation:wigL .6s ease-in-out infinite;transform-origin:12px 31px}
.br{animation:wigR .6s ease-in-out infinite;transform-origin:32px 31px}
.al{animation:twitch .8s ease-in-out infinite;transform-origin:10px 8px}
.ar{animation:twitch .8s ease-in-out .1s infinite;transform-origin:34px 8px}
</style>
<g class="al"><line x1="10" y1="8" x2="7" y2="2" stroke="#795548" stroke-width="3" stroke-linecap="round"/></g>
<g class="ar"><line x1="34" y1="8" x2="37" y2="2" stroke="#795548" stroke-width="3" stroke-linecap="round"/></g>
<ellipse cx="22" cy="19" rx="14" ry="12" fill="#66BB6A"/>
<circle cx="15" cy="16" r="4" fill="#FFF"/>
<circle cx="29" cy="16" r="4" fill="#FFF"/>
<circle cx="15.5" cy="16.5" r="2.2" fill="#37474F"/>
<circle cx="29.5" cy="16.5" r="2.2" fill="#37474F"/>
<path d="M16 24 Q22 29 28 24" stroke="#2E7D32" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<g class="bl">
<line x1="12" y1="31" x2="8" y2="40" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round"/>
<line x1="18" y1="31" x2="16" y2="40" stroke="#FFA726" stroke-width="2" stroke-linecap="round"/>
</g>
<g class="br">
<line x1="26" y1="31" x2="28" y2="40" stroke="#42A5F5" stroke-width="2" stroke-linecap="round"/>
<line x1="32" y1="31" x2="36" y2="40" stroke="#AB47BC" stroke-width="2.5" stroke-linecap="round"/>
</g>
</svg>
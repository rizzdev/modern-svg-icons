<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="256" height="256">
<style>
@keyframes shimmer{0%{opacity:.45}50%{opacity:1}100%{opacity:.45}}
.s1{animation:shimmer 2s ease-in-out infinite}
.s2{animation:shimmer 2s ease-in-out .25s infinite}
.s3{animation:shimmer 2s ease-in-out .5s infinite}
.s4{animation:shimmer 2s ease-in-out .75s infinite}
.s5{animation:shimmer 2s ease-in-out 1s infinite}
.s6{animation:shimmer 2s ease-in-out 1.25s infinite}
</style>
<rect x="6" y="2" width="32" height="40" rx="4" fill="#ECEFF1"/>
<rect class="s1" x="10" y="8" width="24" height="4" rx="1.5" fill="#42A5F5"/>
<rect class="s2" x="10" y="14" width="18" height="3" rx="1" fill="#EF5350"/>
<rect class="s3" x="10" y="19" width="22" height="3" rx="1" fill="#78909C"/>
<rect class="s4" x="10" y="24" width="14" height="3" rx="1" fill="#AB47BC"/>
<rect class="s4" x="26" y="24" width="8" height="3" rx="1" fill="#FFB74D"/>
<rect class="s5" x="10" y="29" width="20" height="3" rx="1" fill="#66BB6A"/>
<rect class="s6" x="10" y="34" width="10" height="3" rx="1" fill="#78909C"/>
</svg>
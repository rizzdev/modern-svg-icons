<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="256" height="256">
<style>
@keyframes batchPop{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.bp1{animation:batchPop 2s ease-in-out infinite;transform-origin:14px 14px}
.bp2{animation:batchPop 2s ease-in-out .3s infinite;transform-origin:30px 14px}
.bp3{animation:batchPop 2s ease-in-out .6s infinite;transform-origin:14px 30px}
.bp4{animation:batchPop 2s ease-in-out .9s infinite;transform-origin:30px 30px}
</style>
<g class="bp1"><rect x="5" y="5" width="16" height="16" rx="3" fill="#42A5F5"/></g>
<g class="bp2"><rect x="23" y="5" width="16" height="16" rx="3" fill="#FFC107"/></g>
<g class="bp3"><rect x="5" y="23" width="16" height="16" rx="3" fill="#EF5350"/></g>
<g class="bp4"><rect x="23" y="23" width="16" height="16" rx="3" fill="#66BB6A"/></g>
<circle cx="13" cy="13" r="3" fill="#FFF"/>
<circle cx="31" cy="13" r="3" fill="#FFF"/>
<circle cx="13" cy="31" r="3" fill="#FFF"/>
<circle cx="31" cy="31" r="3" fill="#FFF"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="256" height="256"><style>@keyframes stActive{0%,25%{fill:#42A5F5}33%,58%{fill:#CFD8DC}66%,100%{fill:#CFD8DC}}

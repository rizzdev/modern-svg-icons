<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="256" height="256">
<style>
@keyframes rp1{0%,100%{r:9;opacity:.8}50%{r:10;opacity:1}}
@keyframes rp2{0%,100%{r:14;opacity:.7}50%{r:15;opacity:.9}}
@keyframes launch{0%,80%{transform:translateY(0)}90%{transform:translateY(-3px)}100%{transform:translateY(0)}}
.r1{animation:rp1 2s ease-in-out infinite}
.r2{animation:rp2 2s ease-in-out .3s infinite}
.ar{animation:launch 2s ease-in-out infinite}
</style>
<circle class="r2" cx="22" cy="24" r="14" fill="#42A5F5"/>
<circle class="r1" cx="22" cy="24" r="9" fill="#1E88E5"/>
<circle cx="22" cy="24" r="4" fill="#BBDEFB"/>
<g class="ar">
<path d="M22 5 L25 13 L19 13 Z" fill="#FFC107"/>
<path d="M22 5 L22 2" stroke="#FFA000" stroke-width="2.5" stroke-linecap="round"/>
</g>
<circle cx="13" cy="12" r="2.5" fill="#EF5350"/>
<circle cx="31" cy="12" r="2.5" fill="#66BB6A"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="256" height="256"><style>@keyframes ctCycle{0%,30%{opacity:1}35%,65%{opacity:0}70%,100%{opacity:1}}
@keyframes ctCycle2{0%,30%{opacity:0}35%,65%{opacity:1}70%,100%{opacity:0}}

<text x="22" y="32" text-anchor="middle" font-family="monospace" font-size="5" font-weight="bold" fill="#FFF">json</text></g>
<g class="ct2"><text x="22" y="26" text-anchor="middle" font-family="monospace" font-size="4" fill="#FFF">text/</text>
<text x="22" y="32" text-anchor="middle" font-family="monospace" font-size="5" font-weight="bold" fill="#FFF">html</text></g></svg>
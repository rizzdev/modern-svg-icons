.rf{stroke-dasharray:4 4;animation:restFlow 1.5s linear infinite}
</style>
<rect x="4" y="6" width="16" height="32" rx="4" fill="#42A5F5"/>
<rect x="24" y="6" width="16" height="32" rx="4" fill="#66BB6A"/>

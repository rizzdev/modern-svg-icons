<circle cx="22" cy="22" r="16" fill="#66BB6A"/>
<rect class="a1" x="10" y="14" width="3" height="16" rx="1.5" fill="#FFF"/>
<rect class="a2" x="15.5" y="14" width="3" height="16" rx="1.5" fill="#FFF"/>
<rect class="a3" x="21" y="14" width="3" height="16" rx="1.5" fill="#FFF"/>
<rect class="a4" x="26.5" y="14" width="3" height="16" rx="1.5" fill="#FFF"/>
<rect class="a5" x="32" y="14" width="3" height="16" rx="1.5" fill="#FFF"/>
</svg>